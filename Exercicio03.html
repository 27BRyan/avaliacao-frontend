<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Prova Prática - Posicionamento</title>
    <style>
        .cube{
            background-color: blue;
            width: 300px;
            height: 300px;
        }
        .cube2{
            background-color: yellow;
            width: 50px;
            height: 50px;
            position: absolute;
            top: 260px;
            left: 260px;
        }
    </style>
</head>
<body>
    <div class="cube"></div>
    <div class="cube2"></div>
</body>
</html>
